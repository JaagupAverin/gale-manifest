manifest:
  version: "1.2"

  self:
    path: gale_manifest
    west-commands: scripts/west-commands.yml

  remotes:
    - name: origin
      url-base: https://github.com/JaagupAverin
  defaults:
    remote: origin
    revision: main

  projects:
    - name: gale-sensor-app
      path: gale_sensor_app
      groups: [gale, sensor]

    - name: gale-hmi-app
      path: gale_hmi_app
      groups: [gale, hmi]

    - name: gale-shared
      path: gale_shared
      groups: [gale, sensor, hmi]

    - name: gale-zephyr
      path: zephyr
      import:
        name-whitelist:
          - hal_espressif
